mode: scenario

runtimeMapping:
  canonicalization:
    collapseNumericSegments: true
    collapseUuidSegments: true
    collapseDateSegments: true
    collapseTemplateExpressions: true
    dropIgnoredQueryParams: true
  filters:
    suppressGlobalNav: true
    suppressUtilityLinks: true
    suppressDebugRoutes: true

fragments:
  setup.clinician:
    - type: goto
      url: /choose-user
    - type: click
      selector: "a[href*='ae7537b3']"
    - type: waitForUrl
      url: /dashboard

  setup.admin:
    - type: goto
      url: /choose-user
    - type: click
      selector: "a[href*='e1945412']"
    - type: waitForUrl
      url: /dashboard

scenarioSets:
  core-user-journeys:
    - login-and-dashboard
    - clinic-workflow
    - participant-management
    - reading-workflow
    - reporting
  clinic-and-reading:
    - clinic-workflow
    - reading-workflow

scenarios:
  - name: login-and-dashboard
    description: Entry flow from start page through user selection to dashboard
    startUrl: /dashboard
    tags: [entry, core]
    scope:
      includePrefixes: [/, /start, /cis2, /choose-user, /dashboard]
      excludePrefixes: [/prototype-admin, /api, /assets]
    limits:
      maxPages: 20
      maxDepth: 4
    steps:
      - type: goto
        url: /
      - type: beginMap
      - type: click
        selector: "a[href='/start']"
      - type: waitForUrl
        url: /start

  - name: clinic-workflow
    description: Reception/clinic operational flow — appointments, events, check-in
    startUrl: /clinics
    tags: [clinic, appointment, core]
    scope:
      includePrefixes: [/dashboard, /clinics, /events, /reports]
      excludePrefixes:
        [/prototype-admin, /api, /assets, /settings, /participants]
    limits:
      maxPages: 120
      maxDepth: 12
    steps:
      - use: setup.clinician
      - type: beginMap
      # Dashboard
      - type: visit
        url: /dashboard
      # Clinic tabs
      - type: visit
        url: /clinics/today
      - type: visit
        url: /clinics/upcoming
      - type: visit
        url: /clinics/completed
      - type: visit
        url: /clinics/all
      # A specific clinic and its tabs
      - type: visit
        url: /clinics/wtrl7jud
      - type: visit
        url: /clinics/wtrl7jud/checked-in
      - type: visit
        url: /clinics/wtrl7jud/in-progress
      - type: visit
        url: /clinics/wtrl7jud/complete
      - type: visit
        url: /clinics/wtrl7jud/all
      # Clinic report
      - type: visit
        url: /reports/wtrl7jud
      # Appointment and details
      - type: visit
        url: /clinics/wtrl7jud/events/elkfirxy/appointment
      - type: visit
        url: /clinics/wtrl7jud/events/elkfirxy/special-appointment/edit
      - type: visit
        url: /clinics/wtrl7jud/events/elkfirxy/participant
      - type: visit
        url: /clinics/wtrl7jud/events/elkfirxy/medical-information
      - type: visit
        url: /clinics/wtrl7jud/events/elkfirxy/appointment-note
      # Check-in flow
      - type: visit
        url: /clinics/wtrl7jud/events/elkfirxy/confirm-identity
      - type: visit
        url: /clinics/wtrl7jud/events/elkfirxy/review-medical-information
      - type: visit
        url: /clinics/wtrl7jud/events/elkfirxy/take-images
      - type: visit
        url: /clinics/wtrl7jud/events/elkfirxy/images-manual-details
      - type: visit
        url: /clinics/wtrl7jud/events/elkfirxy/check-information
      - type: endMap

  - name: participant-management
    description: Participant lookup, details, medical history, and questionnaire flows
    startUrl: /participants
    tags: [participant, core]
    scope:
      includePrefixes: [/dashboard, /participants]
      excludePrefixes:
        [
          /prototype-admin,
          /api,
          /assets,
          /settings,
          /clinics,
          /reading,
          /reports,
        ]
    limits:
      maxPages: 80
      maxDepth: 10
    steps:
      - use: setup.admin
      - type: beginMap

  - name: reading-workflow
    description: Image reading — batch creation, mammogram review, opinions
    startUrl: /reading
    tags: [reading, core]
    scope:
      includePrefixes: [/dashboard, /reading]
      excludePrefixes:
        [
          /prototype-admin,
          /api,
          /assets,
          /settings,
          /clinics,
          /participants,
          /reports,
        ]
    limits:
      maxPages: 80
      maxDepth: 12
    steps:
      - use: setup.clinician
      - type: beginMap
      # Dashboard and reading landing
      - type: visit
        url: /dashboard
      - type: visit
        url: /reading
      # Enter the batch — click "Start session" link
      - type: click
        selector: "a[href*='/create-batch']"
      - type: snapshot
      # Opinion 1: click "Normal (N)" to submit opinion and advance
      - type: click
        selector: "button:has-text('Normal')"
      - type: wait
        ms: 1000
      - type: snapshot
      # Opinion 2: click "Technical recall (T)" — goes to compare page
      - type: click
        selector: "button:has-text('Technical recall')"
      - type: wait
        ms: 1000
      - type: snapshot
      # Compare: select "Keep my opinion" radio, click Continue
      - type: click
        selector: "input[value='keep']"
      - type: click
        selector: "button:has-text('Continue')"
      - type: wait
        ms: 1000
      - type: snapshot
      # Technical recall: check the RCC checkbox to expose reason dropdown
      - type: check
        selector: "input[value='RCC']"
      - type: wait
        ms: 500
      # Select reason from the revealed dropdown
      - type: select
        selector: "#technicalRecall-RCC-reason"
        value: Image obscured
      - type: click
        selector: "button:has-text('Continue')"
      - type: wait
        ms: 1000
      - type: snapshot
      # Review: click "Confirm and save"
      - type: click
        selector: "button:has-text('Confirm and save')"
      - type: wait
        ms: 1000
      - type: snapshot
      # Existing read: click "Next case" forward link
      - type: click
        selector: ".nhsuk-forward-link"
      - type: wait
        ms: 1000
      - type: snapshot
      # Create custom batch
      - type: visit
        url: /reading/create-custom-batch
      # Clinics tabs
      - type: visit
        url: /reading/clinics/mine
      - type: visit
        url: /reading/clinics/all
      # History tabs
      - type: visit
        url: /reading/history/mine
      - type: visit
        url: /reading/history/all
      # Priors tabs
      - type: visit
        url: /reading/priors
      - type: visit
        url: /reading/priors/not-requested
      - type: visit
        url: /reading/priors/requested
      - type: visit
        url: /reading/priors/resolved
      - type: endMap

  - name: reporting
    description: Reports and data exports
    startUrl: /reports
    tags: [reporting, core]
    scope:
      includePrefixes: [/dashboard, /reports]
      excludePrefixes:
        [
          /prototype-admin,
          /api,
          /assets,
          /settings,
          /clinics,
          /participants,
          /reading,
        ]
    limits:
      maxPages: 40
      maxDepth: 8
    steps:
      - use: setup.admin
      - type: beginMap
